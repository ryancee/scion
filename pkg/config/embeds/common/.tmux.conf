# --- Color & Terminal Settings ---

# Set the default terminal mode to 256 colors
set -g default-terminal "xterm-256color"


# --- General Quality of Life ---

# Increase scrollback buffer size
set -g history-limit 10000

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Mouse support is off by default so that browser-native text selection
# and copy/paste work in the web terminal.  Use the toggle (C-b m or the
# toolbar button in the web UI) to turn it on when you need tmux mouse
# features like pane resizing or scrollback scrolling.
set -s command-alias[100] 'togglemouse=set -g mouse ; display "Mouse: #{?mouse,ON,OFF}"'
bind m togglemouse

# --- Visual Styling (Example 256 Color Theme) ---

# Status bar colors
set -g status-style bg=colour235,fg=colour136

# Status bar content
set -g status-left "[scion] "
set -g status-right-length 100
set -g status-right "#[fg=colour244]#(echo $SCION_TEMPLATE_NAME) #[fg=colour136]/ #[fg=colour166]#(echo $SCION_AGENT_NAME) #[fg=colour136](#(echo $SCION_BROKER_NAME)) #[fg=colour136]%H:%M %d-%b-%y"

# Allow programs to bypass tmux and talk directly to the terminal (required for banners/images)
set -g allow-passthrough on

# Inform tmux that the outside terminal supports RGB/TrueColor
# set -a terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm*:RGB"

# Window title colors
set-window-option -g window-status-style fg=colour244,bg=default
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# Pane border colors
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour240

# Message text
set -g message-style bg=colour235,fg=colour166

set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# set clipboard relay
set -s set-clipboard on

# On mouse-drag-end, copy the selection to the paste buffer (which triggers
# OSC 52 clipboard relay via set-clipboard) but keep the highlight visible
# instead of the default copy-selection-and-cancel which clears it immediately.
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
